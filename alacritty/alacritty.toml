import = ["~/.config/alacritty/theme.toml"]

[font]
size = 12.0
offset.y = 1

[font.bold]
family = "JetBrainsMonoNerdFontMono"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMonoNerdFontMono"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMonoNerdFontMono"
style = "Italic"

[font.normal]
family = "JetBrainsMonoNerdFontMono"
style = "Regular"

[shell]
program = "fish"

[window]
dynamic_title = true
opacity = 0.5
